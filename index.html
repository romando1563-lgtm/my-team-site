<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дашборд команды</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; padding: 20px; padding-top: 70px; }
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 12px; }
h1 { font-size: 22px; color: #2d3748; }
.btn { background: #4f46e5; color: #fff; border: none; padding: 9px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; }
.btn:hover { background: #4338ca; }
.btn.secondary { background: #64748b; }
.btn.secondary:hover { background: #475569; }
.btn.green { background: #16a34a; }
.btn.green:hover { background: #15803d; }
.btn.small { padding: 4px 10px; font-size: 12px; }
.toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
.boss-bar { background: linear-gradient(135deg,#1e293b,#334155); color:#fff; border-radius:14px; padding:16px 20px; margin-bottom:18px; display:flex; align-items:center; justify-content:space-between; }
.boss-info { display:flex; align-items:center; gap:14px; }
.boss-avatar { width:52px; height:52px; border-radius:50%; background:#f59e0b; display:flex; align-items:center; justify-content:center; font-size:24px; }
.boss-name { font-size:18px; font-weight:700; }
.boss-role { font-size:13px; opacity:.8; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 22px; }
.stat-card { background: #fff; padding: 16px; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.stat-card .label { font-size: 13px; color: #718096; }
.stat-card .value { font-size: 26px; font-weight: 700; margin-top: 4px; }
.groups { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; align-items: start; }
@media (max-width: 1100px){ .groups { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 720px){ .groups { grid-template-columns: 1fr; } }
.group { background: #fff; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.06); overflow: hidden; display: flex; flex-direction: column; }
.group-head { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; color: #fff; }
.group-head h2 { font-size: 17px; }
.group-head .count { font-size: 12px; opacity: .85; }
.group-body { padding: 12px; min-height: 60px; flex: 1; display:grid; gap:10px; align-content:start; }
.team-goals { padding: 10px 12px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
.team-goals .tg-title { font-size: 12px; font-weight:600; display:flex; justify-content:space-between; align-items:center; gap:6px; margin-bottom:6px; }
.team-goals .tg-title .tg-left { display:flex; align-items:center; gap:6px; }
.team-goals-list { max-height:120px; overflow:hidden; transition:max-height .25s ease; }
.team-goals-list.expanded { max-height:1000px; overflow-y:auto; }
.expand-toggle { background:none; border:none; cursor:pointer; font-size:11px; color:#4f46e5; padding:4px; }
.emp { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; border-left: 4px solid #94a3b8; cursor: grab; display:flex; flex-direction:column; }
.emp.lead { border-left-color: #f59e0b; background: #fffbeb; }
.emp-collapsible { max-height: 210px; overflow: hidden; transition: max-height .25s ease; }
.emp.expanded .emp-collapsible { max-height: 2000px; overflow-y: auto; }
.emp-expand-btn { background:none; border:1px solid #e2e8f0; border-radius:6px; cursor:pointer; font-size:11px; color:#4f46e5; padding:4px; margin-top:8px; }
.emp-top { display: flex; justify-content: space-between; align-items: flex-start; }
.emp-name { font-weight: 600; font-size: 15px; }
.emp-role { font-size: 12px; color: #64748b; margin-top: 2px; }
.badge { font-size: 10px; background: #f59e0b; color: #fff; padding: 2px 6px; border-radius: 6px; }
.badge.sub { background: #6366f1; }
.emp-actions { display: flex; gap: 4px; }
.icon-btn { background: none; border: none; cursor: pointer; font-size: 14px; opacity: .5; }
.icon-btn:hover { opacity: 1; }
.schedule { font-size: 12px; color: #475569; margin-top: 6px; }
.duties-title { font-size:11px; font-weight:600; color:#475569; display:flex; justify-content:space-between; margin-top:8px; margin-bottom:4px; }
.duties-list { list-style:none; }
.duty-item { display:flex; align-items:flex-start; gap:6px; font-size:12px; padding:3px 6px; }
.duty-bullet { color:#6366f1; }
.duty-text { flex:1; }
.duty-del { cursor:pointer; color:#dc2626; font-weight:700; }
.duties-empty { font-size:11px; color:#94a3b8; }
.goals-header { font-size:11px; font-weight:600; color:#475569; display:flex; justify-content:space-between; margin-top:10px; margin-bottom:4px; }
.goals-list { max-height:180px; overflow-y:auto; }
.goal { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 7px 9px; margin-bottom: 6px; }
.goal.done { opacity:.7; background:#f0fdf4; }
.goal-top { display:flex; justify-content:space-between; align-items:flex-start; gap:6px; }
.goal-text { font-size:12px; font-weight:500; }
.goal.done .goal-text { text-decoration: line-through; }
.goal-meta { font-size:10px; color:#94a3b8; margin-top:2px; display:flex; gap:8px; }
.goal-prio { font-size:9px; padding:1px 5px; border-radius:4px; color:#fff; }
.prio-low { background:#94a3b8; } .prio-mid { background:#3b82f6; } .prio-high { background:#dc2626; }
.goal-prog-controls { display:flex; align-items:center; gap:8px; margin-top:6px; }
.goal-prog-controls input[type=range] { flex:1; -webkit-appearance:none; height:6px; border-radius:3px; background:#e2e8f0; outline:none; }
.goal-prog-controls input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:#4f46e5; cursor:pointer; }
.goal-prog-controls input[type=range]::-moz-range-thumb { width:14px; height:14px; border-radius:50%; background:#4f46e5; cursor:pointer; border:none; }
.goal.done .goal-prog-controls input[type=range]::-webkit-slider-thumb { background:#16a34a; }
.goal.done .goal-prog-controls input[type=range]::-moz-range-thumb { background:#16a34a; }
.goal-prog-controls .pct { font-size:10px; color:#64748b; min-width:32px; text-align:right; }
.goals-empty { font-size:11px; color:#94a3b8; text-align:center; padding:8px; }
.add-emp-btn { background: transparent; border: 2px dashed #cbd5e1; color: #64748b; padding: 8px; border-radius: 8px; cursor: pointer; height: 44px; display:flex; align-items:center; justify-content:center; }
.add-emp-btn:hover { border-color:#4f46e5; color:#4f46e5; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.overlay.show { display: flex; }
.modal { background: #fff; border-radius: 14px; padding: 24px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
.modal h3 { margin-bottom: 16px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 13px; margin-bottom: 5px; }
.field input, .field select, .field textarea { width: 100%; padding: 9px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; }
.field textarea { min-height: 80px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
.empty { color: #94a3b8; font-size: 13px; text-align: center; padding: 10px; grid-column:1/-1; }

#toastMsg { position:fixed; bottom:20px; right:20px; padding:12px 20px; border-radius:8px; font-size:14px; font-weight:600; color:#fff; z-index:2000; box-shadow:0 4px 12px rgba(0,0,0,.25); opacity:0; transition:opacity .3s; pointer-events:none; }

#saveBar { position:fixed; top:0; left:0; right:0; background:#fff; border-bottom:2px solid #e2e8f0; padding:10px 20px; display:flex; align-items:center; justify-content:space-between; z-index:1000; box-shadow:0 2px 8px rgba(0,0,0,.06); flex-wrap:wrap; gap:10px; }
#saveStatus { font-size:13px; color:#64748b; display:flex; align-items:center; gap:8px; }
#saveStatus.unsaved { color:#dc2626; font-weight:600; }
#saveStatus .dot { width:8px; height:8px; border-radius:50%; background:#16a34a; flex-shrink:0; }
#saveStatus.unsaved .dot { background:#dc2626; animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }
#saveNowBtn { background:#16a34a; color:#fff; border:none; padding:10px 20px; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; }
#saveNowBtn:hover { background:#15803d; }
#saveNowBtn:disabled { background:#94a3b8; cursor:not-allowed; }

#onlineBar { display:flex; align-items:center; gap:8px; font-size:13px; color:#334155; flex-wrap:wrap; }
#onlineBar .online-dot { width:8px; height:8px; border-radius:50%; background:#16a34a; flex-shrink:0; box-shadow:0 0 0 2px rgba(22,163,74,.2); }
.online-user { background:#eef2ff; color:#4338ca; padding:3px 10px; border-radius:12px; font-size:12px; font-weight:600; }
</style>
</head>
<body>

<!-- Панель сохранения + онлайн -->
<div id="saveBar">
  <div style="display:flex; align-items:center; gap:20px; flex-wrap:wrap;">
    <div id="saveStatus"><span class="dot"></span><span id="saveStatusText">Все изменения сохранены</span></div>
    <div id="onlineBar"><span class="online-dot"></span><span>Сейчас на сайте:</span><span id="onlineList" style="display:flex; gap:6px; flex-wrap:wrap;"></span></div>
  </div>
  <button id="saveNowBtn" onclick="saveDB()">💾 Сохранить изменения</button>
</div>

<div id="toastMsg"></div>

<!-- Экран входа -->
<div id="authScreen" style="display:none; position:fixed; inset:0; background:#f0f2f5; z-index:999; align-items:center; justify-content:center;">
  <div style="background:#fff; padding:40px; border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,.12); text-align:center; width:320px;">
    <div style="font-size:52px; margin-bottom:12px;">🔒</div>
    <h2 style="margin-bottom:6px; color:#1e293b;">Дашборд команды</h2>
    <p style="font-size:14px; color:#64748b; margin-bottom:18px;">Введите ваше имя и пароль</p>
    <input id="nameInput" type="text" placeholder="Ваше имя" style="width:100%; padding:11px; border:1px solid #cbd5e1; border-radius:8px; font-size:15px; margin-bottom:10px; outline:none; text-align:center;">
    <input id="passwordInput" type="password" placeholder="Пароль" style="width:100%; padding:11px; border:1px solid #cbd5e1; border-radius:8px; font-size:15px; margin-bottom:10px; outline:none; text-align:center; letter-spacing:3px;">
    <div id="passwordError" style="display:none; color:#dc2626; font-size:13px; margin-bottom:10px;">❌ Проверьте имя и пароль</div>
    <button onclick="submitPassword()" style="width:100%; background:#4f46e5; color:#fff; border:none; padding:12px; border-radius:8px; font-size:15px; cursor:pointer; font-weight:600;">Войти</button>
  </div>
</div>

<header>
<h1>📊 Дашборд команды</h1>
<div class="toolbar">
<button class="btn" onclick="openGroupModal()">➕ Группа</button>
<button class="btn secondary" onclick="exportData()">📤 Экспорт JSON</button>
<button class="btn secondary" onclick="triggerImport()">📥 Импорт JSON</button>
<button class="btn secondary" onclick="logout()">🚪 Выйти</button>
<input type="file" id="importInput" accept="application/json" style="display:none" onchange="importData(event)">
</div>
</header>

<div class="boss-bar" id="bossBar">
<div class="boss-info">
<div class="boss-avatar">👑</div>
<div><div class="boss-name">Загрузка...</div><div class="boss-role"></div></div>
</div>
<button class="btn secondary small" onclick="openBossModal()">✏️</button>
</div>

<div class="stats" id="stats"></div>
<div class="groups" id="groups"><div class="empty">Подключение к базе...</div></div>

<div class="overlay" id="bossOverlay"><div class="modal"><h3>Руководитель</h3><div class="field"><label>Имя</label><input id="bossName"></div><div class="field"><label>Должность</label><input id="bossRole"></div><div class="modal-actions"><button class="btn secondary" onclick="closeBossModal()">Отмена</button><button class="btn" onclick="saveBoss()">Сохранить</button></div></div></div>
<div class="overlay" id="empOverlay"><div class="modal"><h3 id="empModalTitle">Сотрудник</h3><div class="field"><label>Имя</label><input id="empName"></div><div class="field"><label>Должность</label><input id="empRole"></div><div class="field"><label>График</label><input id="empSchedule"></div><div class="field"><label>Статус</label><select id="empStatus"><option value="member">Участник</option><option value="lead">Руководитель</option><option value="sublead">Зам</option></select></div><div class="field"><label>Обязанности</label><textarea id="empDuties"></textarea></div><div class="modal-actions"><button class="btn secondary" onclick="closeEmpModal()">Отмена</button><button class="btn" onclick="saveEmp()">Сохранить</button></div></div></div>
<div class="overlay" id="dutyOverlay"><div class="modal"><h3>Обязанность</h3><div class="field"><label>Текст</label><input id="dutyText"></div><div class="modal-actions"><button class="btn secondary" onclick="closeDutyModal()">Отмена</button><button class="btn" onclick="saveDuty()">Добавить</button></div></div></div>
<div class="overlay" id="groupOverlay"><div class="modal"><h3 id="groupModalTitle">Группа</h3><div class="field"><label>Название</label><input id="groupName"></div><div class="field"><label>Цвет</label><input id="groupColor" type="color" value="#4f46e5"></div><div class="modal-actions"><button class="btn secondary" onclick="closeGroupModal()">Отмена</button><button class="btn" id="groupSaveBtn" onclick="saveGroup()">Создать</button></div></div></div>
<div class="overlay" id="goalOverlay"><div class="modal"><h3 id="goalModalTitle">Цель</h3><div class="field"><label>Описание</label><input id="goalText"></div><div class="field"><label>Приоритет</label><select id="goalPrio"><option value="low">Низкий</option><option value="mid" selected>Средний</option><option value="high">Высокий</option></select></div><div class="field"><label>Дедлайн</label><input id="goalDeadline" type="date"></div><div class="field"><label>Прогресс</label><input id="goalProgress" type="number" min="0" max="100" value="0"></div><div class="modal-actions"><button class="btn secondary" onclick="closeGoalModal()">Отмена</button><button class="btn green" onclick="saveGoal()">Сохранить</button></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
var SB_URL = "https://emsndpczwqeqhwozlsxb.supabase.co";
var SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtc25kcGN6d3FlcWh3b3psc3hiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNDA4NTMsImV4cCI6MjA5OTYxNjg1M30.bWbUHFXjGqZfJ5Zp5Zmyr1iAhci08ndF_jUNxSR22EU";
var db = supabase.createClient(SB_URL, SB_KEY);

var PASS = "Ds7@k2";
var hasUnsavedChanges = false;
var lastKnownUpdatedAt = null;
var myName = "";
var presenceChannel = null;

/* ============ TOAST ============ */
function showToast(text, color){
  var el = document.getElementById('toastMsg');
  el.textContent = text;
  el.style.background = color;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.style.opacity = '0'; }, 3000);
}

/* ============ СТАТУС СОХРАНЕНИЯ ============ */
function markUnsaved(){
  hasUnsavedChanges = true;
  var status = document.getElementById('saveStatus');
  status.classList.add('unsaved');
  document.getElementById('saveStatusText').textContent = 'Есть несохранённые изменения';
  document.getElementById('saveNowBtn').disabled = false;
}
function markSaved(){
  hasUnsavedChanges = false;
  var status = document.getElementById('saveStatus');
  status.classList.remove('unsaved');
  document.getElementById('saveStatusText').textContent = 'Все изменения сохранены';
}
window.addEventListener('beforeunload', function(e){
  if(hasUnsavedChanges){ e.preventDefault(); e.returnValue = ''; }
});

/* ============ PRESENCE (Кто онлайн) ============ */
function setupPresence(){
  presenceChannel = db.channel('dashboard-online', {
    config: { presence: { key: myName + '_' + Date.now() } }
  });

  presenceChannel
    .on('presence', { event: 'sync' }, function(){
      var state = presenceChannel.presenceState();
      renderOnlineUsers(state);
    })
    .subscribe(function(status){
      if(status === 'SUBSCRIBED'){
        presenceChannel.track({ name: myName, online_at: new Date().toISOString() });
      }
    });
}

function renderOnlineUsers(state){
  var names = [];
  for(var key in state){
    var presences = state[key];
    if(presences && presences.length){
      names.push(presences[0].name);
    }
  }
  // убираем дубли (если у одного человека 2 вкладки)
  var unique = [];
  names.forEach(function(n){ if(unique.indexOf(n) === -1) unique.push(n); });

  var el = document.getElementById('onlineList');
  if(unique.length === 0){
    el.innerHTML = '<span style="color:#94a3b8">никого нет</span>';
  } else {
    el.innerHTML = unique.map(function(n){
      return '<span class="online-user">' + esc(n) + '</span>';
    }).join('');
  }
}

/* ============ АВТОРИЗАЦИЯ ============ */
function checkPassword(){
  var savedAuth = localStorage.getItem('dash_auth');
  var savedName = localStorage.getItem('dash_username');
  if(savedAuth === 'ok' && savedName){
    myName = savedName;
    document.getElementById('authScreen').style.display = 'none';
    loadData();
    setupPresence();
  } else {
    document.getElementById('authScreen').style.display = 'flex';
  }
}

function submitPassword(){
  var name = document.getElementById('nameInput').value.trim();
  var val = document.getElementById('passwordInput').value;
  if(!name){
    document.getElementById('passwordError').textContent = '❌ Введите ваше имя';
    document.getElementById('passwordError').style.display = 'block';
    return;
  }
  if(val === PASS){
    myName = name;
    localStorage.setItem('dash_auth','ok');
    localStorage.setItem('dash_username', name);
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('passwordError').style.display = 'none';
    loadData();
    setupPresence();
  } else {
    document.getElementById('passwordError').textContent = '❌ Неверный пароль';
    document.getElementById('passwordError').style.display = 'block';
    document.getElementById('passwordInput').value = '';
    document.getElementById('passwordInput').focus();
  }
}

function logout(){
  if(hasUnsavedChanges && !confirm('Есть несохранённые изменения. Выйти без сохранения?')) return;
  if(presenceChannel) presenceChannel.untrack();
  localStorage.removeItem('dash_auth');
  localStorage.removeItem('dash_username');
  location.reload();
}

document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('passwordInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter') submitPassword();
  });
  document.getElementById('nameInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter') document.getElementById('passwordInput').focus();
  });
});

/* ============ ДАННЫЕ ============ */
var data = { boss: { name: "", role: "" }, groups: [] };
var editing = { groupId: null, empId: null };
var goalTarget = { type:null, groupId:null, empId:null, goalId:null };
var dutyTarget = { groupId:null, empId:null };
var editingGroupId = null;

function esc(s){ return (s||'').replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
function prioClass(p){ return p==='high'?'prio-high':p==='low'?'prio-low':'prio-mid'; }
function prioLabel(p){ return p==='high'?'Высокий':p==='low'?'Низкий':'Средний'; }
function fmtDate(d){ if(!d) return ''; var dt=new Date(d); return dt.toLocaleDateString('ru-RU',{day:'2-digit',month:'short'}); }

async function loadData(){
  try {
    var res = await db.from('dashboard_data').select('data, updated_at').eq('id', 1).limit(1);
    if(res.error) throw res.error;
    if(res.data && res.data.length){
      data = res.data[0].data;
      lastKnownUpdatedAt = res.data[0].updated_at;
      if(!data.groups) data.groups=[];
      if(!data.boss) data.boss={name:"",role:""};
    }
  } catch(e){
    console.error('load error', e);
    showToast('❌ Ошибка загрузки данных', '#dc2626');
  }
  render();
}

async function saveDB(){
  var btn = document.getElementById('saveNowBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Сохранение...';

  try {
    var check = await db.from('dashboard_data').select('updated_at').eq('id',1).limit(1);
    if(check.data && check.data.length){
      var currentUpdatedAt = check.data[0].updated_at;
      if(lastKnownUpdatedAt && currentUpdatedAt && currentUpdatedAt !== lastKnownUpdatedAt){
        var ok = confirm('⚠️ Кто-то другой уже сохранил изменения после вашей последней загрузки.\n\nЕсли продолжите — ВАША версия перезапишет ЕГО изменения.\n\nОК = сохранить свою версию.\nОтмена = обновить страницу и увидеть чужие изменения.');
        if(!ok){
          btn.disabled = false;
          btn.textContent = '💾 Сохранить изменения';
          return;
        }
      }
    }

    var res = await db.from('dashboard_data').upsert({id:1, data:data});
    if(res.error) throw res.error;

    var fresh = await db.from('dashboard_data').select('updated_at').eq('id',1).limit(1);
    if(fresh.data && fresh.data.length) lastKnownUpdatedAt = fresh.data[0].updated_at;

    markSaved();
    showToast('✅ Сохранено (' + myName + ')', '#16a34a');
  } catch(e){
    console.error('save error', e);
    showToast('❌ ОШИБКА СОХРАНЕНИЯ! Проверьте интернет', '#dc2626');
  }

  btn.disabled = false;
  btn.textContent = '💾 Сохранить изменения';
}

function render(){
  renderBoss();
  renderStats();
  var cont = document.getElementById('groups');
  cont.innerHTML = '';
  if(!data.groups || !data.groups.length){
    cont.innerHTML = '<div class="empty">Нет групп. Нажмите "➕ Группа"</div>';
    return;
  }
  data.groups.forEach(function(g){
    var el = document.createElement('div');
    el.className = 'group';
    el.innerHTML = groupHTML(g);
    cont.appendChild(el);
  });
  attachDrag();
}

function groupHTML(g){
  var emps = g.employees || [];
  var goals = g.goals || [];
  return '<div class="group-head" style="background:'+g.color+'">'+
    '<div><h2>'+esc(g.name)+'</h2><div class="count">'+emps.length+' сотр.</div></div>'+
    '<div><button class="icon-btn" style="color:#fff" onclick="openGoalModal(\'team\',\''+g.id+'\')">🎯</button>'+
    '<button class="icon-btn" style="color:#fff" onclick="editGroup(\''+g.id+'\')">✏️</button>'+
    '<button class="icon-btn" style="color:#fff" onclick="deleteGroup(\''+g.id+'\')">🗑</button></div></div>'+
    '<div class="team-goals"><div class="tg-title"><span class="tg-left">🎯 Цели команды</span>'+
    '<span>'+(goals.length>2?'<button class="expand-toggle" onclick="toggleTeamGoals(this)">развернуть ▾</button>':'')+
    '<button class="btn green small" onclick="openGoalModal(\'team\',\''+g.id+'\')">＋</button></span></div>'+
    '<div class="team-goals-list">'+(goals.length?goals.map(function(gl){return goalHTML(gl,'team',g.id,null);}).join(''):'<div class="goals-empty">Нет целей</div>')+'</div></div>'+
    '<div class="group-body" data-group="'+g.id+'" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,\''+g.id+'\')">'+
    (emps.length?emps.map(function(e,i){return empHTML(g.id,e,i,emps.length);}).join(''):'<div class="empty">Пусто</div>')+
    '<button class="add-emp-btn" onclick="openEmpModal(\''+g.id+'\')">＋ Сотрудник</button></div>';
}

function empHTML(gid, e, idx, total){
  var badge = e.status==='lead' ? '<span class="badge">👑</span>' : e.status==='sublead' ? '<span class="badge sub">⭐</span>' : '';
  var duties = e.duties || [];
  var goals = e.goals || [];
  var upBtn   = idx>0       ? '<button class="icon-btn" onclick="moveEmp(\''+gid+'\',\''+e.id+'\',-1)">🔼</button>' : '';
  var downBtn = idx<total-1 ? '<button class="icon-btn" onclick="moveEmp(\''+gid+'\',\''+e.id+'\',1)">🔽</button>' : '';
  return '<div class="emp '+(e.status!=='member'?'lead':'')+'" draggable="true" data-emp="'+e.id+'" data-group="'+gid+'">'+
    '<div class="emp-top"><div><div class="emp-name">'+esc(e.name)+' '+badge+'</div><div class="emp-role">'+esc(e.role||'')+'</div></div>'+
    '<div class="emp-actions">'+upBtn+downBtn+
    '<button class="icon-btn" onclick="openGoalModal(\'emp\',\''+gid+'\',\''+e.id+'\')">🎯</button>'+
    '<button class="icon-btn" onclick="editEmp(\''+gid+'\',\''+e.id+'\')">✏️</button>'+
    '<button class="icon-btn" onclick="deleteEmp(\''+gid+'\',\''+e.id+'\')">🗑</button></div></div>'+
    '<div class="emp-collapsible">'+
    '<div class="schedule">📅 '+esc(e.schedule||'')+'</div>'+
    '<div class="duties-title">📋 Обязанности<button class="btn small" onclick="openDutyModal(\''+gid+'\',\''+e.id+'\')">＋</button></div>'+
    '<ul class="duties-list">'+(duties.length?duties.map(function(d,i){return '<li class="duty-item"><span class="duty-bullet">•</span><span class="duty-text">'+esc(d)+'</span><span class="duty-del" onclick="removeDuty(\''+gid+'\',\''+e.id+'\','+i+')">×</span></li>';}).join(''):'<li class="duties-empty">Нет</li>')+'</ul>'+
    '<div class="goals-header">🎯 Цели ('+goals.length+')<button class="btn green small" onclick="openGoalModal(\'emp\',\''+gid+'\',\''+e.id+'\')">＋</button></div>'+
    '<div class="goals-list">'+(goals.length?goals.map(function(gl){return goalHTML(gl,'emp',gid,e.id);}).join(''):'<div class="goals-empty">Нет</div>')+'</div>'+
    '</div>'+
    '<button class="emp-expand-btn" onclick="toggleEmp(this)">Развернуть ▾</button></div>';
}

function goalHTML(gl, type, gid, eid){
  var eidStr = eid ? "'"+eid+"'" : 'null';
  return '<div class="goal '+(gl.done?'done':'')+'"><div class="goal-top"><div>'+
    '<div class="goal-text">'+esc(gl.text)+'</div>'+
    '<div class="goal-meta"><span class="goal-prio '+prioClass(gl.prio)+'">'+prioLabel(gl.prio)+'</span>'+(gl.deadline?'<span>📆 '+fmtDate(gl.deadline)+'</span>':'')+'</div></div>'+
    '<div><button class="icon-btn" onclick="toggleGoal(\''+type+'\',\''+gid+'\','+eidStr+',\''+gl.id+'\')">'+(gl.done?'↩️':'✅')+'</button>'+
    '<button class="icon-btn" onclick="editGoal(\''+type+'\',\''+gid+'\','+eidStr+',\''+gl.id+'\')">✏️</button>'+
    '<button class="icon-btn" onclick="deleteGoal(\''+type+'\',\''+gid+'\','+eidStr+',\''+gl.id+'\')">🗑</button></div></div>'+
    '<div class="goal-prog-controls"><input type="range" min="0" max="100" value="'+gl.progress+'" oninput="setGoalProgress(\''+type+'\',\''+gid+'\','+eidStr+',\''+gl.id+'\',this.value)"><span class="pct">'+gl.progress+'%</span></div></div>';
}

function toggleTeamGoals(btn){
  var list = btn.closest('.team-goals').querySelector('.team-goals-list');
  var open = list.classList.toggle('expanded');
  btn.textContent = open ? 'свернуть ▴' : 'развернуть ▾';
}
function toggleEmp(btn){
  var emp = btn.closest('.emp');
  var open = emp.classList.toggle('expanded');
  btn.textContent = open ? 'Свернуть ▴' : 'Развернуть ▾';
}
function moveEmp(gid, eid, dir){
  var g = data.groups.find(function(x){return x.id===gid;});
  var i = g.employees.findIndex(function(x){return x.id===eid;});
  var j = i + dir;
  if(j<0 || j>=g.employees.length) return;
  var tmp = g.employees[i]; g.employees[i] = g.employees[j]; g.employees[j] = tmp;
  render(); markUnsaved();
}

function renderBoss(){
  var b = data.boss || {};
  var bar = document.getElementById('bossBar');
  if(b.name){
    bar.innerHTML = '<div class="boss-info"><div class="boss-avatar">👑</div><div><div class="boss-name">'+esc(b.name)+'</div><div class="boss-role">'+esc(b.role||'')+'</div></div></div><button class="btn secondary small" onclick="openBossModal()">✏️</button>';
  } else {
    bar.innerHTML = '<div class="boss-info">👑 Не назначен</div><button class="btn small" onclick="openBossModal()">➕</button>';
  }
}

function renderStats(){
  var all = (data.groups||[]).reduce(function(a,g){return a.concat(g.employees||[]);},[]);
  var allGoals = (data.groups||[]).reduce(function(a,g){return a.concat(g.goals||[]);},[]).concat(all.reduce(function(a,e){return a.concat(e.goals||[]);},[]));
  var done = allGoals.filter(function(g){return g.done;}).length;
  document.getElementById('stats').innerHTML = '<div class="stat-card"><div class="label">Сотрудников</div><div class="value">'+all.length+'</div></div><div class="stat-card"><div class="label">Цели</div><div class="value" style="color:#16a34a">'+done+'/'+allGoals.length+'</div></div>';
}

var dragged = null;
function attachDrag(){
  document.querySelectorAll('.emp').forEach(function(el){
    el.addEventListener('dragstart', function(){ dragged = {emp:el.dataset.emp, group:el.dataset.group}; });
  });
}
function onDragOver(e){ e.preventDefault(); }
function onDragLeave(e){}
function onDrop(e, target){
  e.preventDefault();
  if(!dragged || dragged.group===target) return;
  var fromG = data.groups.find(function(g){return g.id===dragged.group;});
  var toG = data.groups.find(function(g){return g.id===target;});
  var idx = fromG.employees.findIndex(function(x){return x.id===dragged.emp;});
  var emp = fromG.employees.splice(idx,1)[0];
  toG.employees.push(emp);
  dragged=null; render(); markUnsaved();
}

function openBossModal(){ document.getElementById('bossName').value=data.boss.name||''; document.getElementById('bossRole').value=data.boss.role||''; document.getElementById('bossOverlay').classList.add('show'); }
function closeBossModal(){ document.getElementById('bossOverlay').classList.remove('show'); }
function saveBoss(){ var n=document.getElementById('bossName').value.trim(); if(!n)return alert('Имя?'); data.boss={name:n,role:document.getElementById('bossRole').value.trim()}; closeBossModal(); render(); markUnsaved(); }

function openEmpModal(gid){ editing={groupId:gid,empId:null}; document.getElementById('empModalTitle').textContent='Новый'; ['empName','empRole','empSchedule','empDuties'].forEach(function(id){document.getElementById(id).value='';}); document.getElementById('empStatus').value='member'; document.getElementById('empOverlay').classList.add('show'); }
function editEmp(gid,eid){ editing={groupId:gid,empId:eid}; var g=data.groups.find(function(x){return x.id===gid;}); var e=g.employees.find(function(x){return x.id===eid;}); document.getElementById('empModalTitle').textContent='Ред.'; document.getElementById('empName').value=e.name; document.getElementById('empRole').value=e.role; document.getElementById('empSchedule').value=e.schedule; document.getElementById('empStatus').value=e.status; document.getElementById('empDuties').value=(e.duties||[]).join('\n'); document.getElementById('empOverlay').classList.add('show'); }
function saveEmp(){ var n=document.getElementById('empName').value.trim(); if(!n)return alert('Имя?'); var g=data.groups.find(function(x){return x.id===editing.groupId;}); var obj={name:n,role:document.getElementById('empRole').value.trim(),schedule:document.getElementById('empSchedule').value.trim(),status:document.getElementById('empStatus').value,duties:document.getElementById('empDuties').value.split('\n').map(function(s){return s.trim();}).filter(Boolean)}; if(editing.empId){var e=g.employees.find(function(x){return x.id===editing.empId;});Object.assign(e,obj);}else{obj.id='e'+Date.now();obj.goals=[];g.employees.push(obj);} closeEmpModal(); render(); markUnsaved(); }
function closeEmpModal(){ document.getElementById('empOverlay').classList.remove('show'); }
function deleteEmp(gid,eid){ if(!confirm('Удалить?'))return; var g=data.groups.find(function(x){return x.id===gid;}); g.employees=g.employees.filter(function(x){return x.id!==eid;}); render(); markUnsaved(); }

function openDutyModal(gid,eid){ dutyTarget={groupId:gid,empId:eid}; document.getElementById('dutyText').value=''; document.getElementById('dutyOverlay').classList.add('show'); }
function closeDutyModal(){ document.getElementById('dutyOverlay').classList.remove('show'); }
function saveDuty(){ var t=document.getElementById('dutyText').value.trim(); if(!t)return; var g=data.groups.find(function(x){return x.id===dutyTarget.groupId;}); var e=g.employees.find(function(x){return x.id===dutyTarget.empId;}); if(!e.duties)e.duties=[]; e.duties.push(t); closeDutyModal(); render(); markUnsaved(); }
function removeDuty(gid,eid,i){ var g=data.groups.find(function(x){return x.id===gid;}); var e=g.employees.find(function(x){return x.id===eid;}); e.duties.splice(i,1); render(); markUnsaved(); }

function getGoalArr(type,gid,eid){ var g=data.groups.find(function(x){return x.id===gid;}); if(!g)return[]; if(type==='team')return g.goals||[]; var e=g.employees.find(function(x){return x.id===eid;}); return e?(e.goals||[]):[]; }
function openGoalModal(type,gid,eid){ goalTarget={type:type,groupId:gid,empId:eid||null,goalId:null}; document.getElementById('goalModalTitle').textContent='Цель'; document.getElementById('goalText').value=''; document.getElementById('goalPrio').value='mid'; document.getElementById('goalDeadline').value=''; document.getElementById('goalProgress').value=0; document.getElementById('goalOverlay').classList.add('show'); }
function editGoal(type,gid,eid,glid){ goalTarget={type:type,groupId:gid,empId:eid,goalId:glid}; var arr=getGoalArr(type,gid,eid); var gl=arr.find(function(x){return x.id===glid;}); document.getElementById('goalModalTitle').textContent='Ред.цель'; document.getElementById('goalText').value=gl.text; document.getElementById('goalPrio').value=gl.prio; document.getElementById('goalDeadline').value=gl.deadline||''; document.getElementById('goalProgress').value=gl.progress; document.getElementById('goalOverlay').classList.add('show'); }
function saveGoal(){ var t=document.getElementById('goalText').value.trim(); if(!t)return alert('Текст?'); var arr=getGoalArr(goalTarget.type,goalTarget.groupId,goalTarget.empId); var p=parseInt(document.getElementById('goalProgress').value)||0; var obj={text:t,prio:document.getElementById('goalPrio').value,deadline:document.getElementById('goalDeadline').value,progress:p,done:p>=100}; if(goalTarget.goalId){var gl=arr.find(function(x){return x.id===goalTarget.goalId;});Object.assign(gl,obj);}else{obj.id='gl'+Date.now();arr.push(obj);} closeGoalModal(); render(); markUnsaved(); }
function closeGoalModal(){ document.getElementById('goalOverlay').classList.remove('show'); }
function deleteGoal(type,gid,eid,glid){ if(!confirm('Удалить?'))return; var arr=getGoalArr(type,gid,eid); var i=arr.findIndex(function(x){return x.id===glid;}); arr.splice(i,1); render(); markUnsaved(); }
function toggleGoal(type,gid,eid,glid){ var arr=getGoalArr(type,gid,eid); var gl=arr.find(function(x){return x.id===glid;}); gl.done=!gl.done; if(gl.done)gl.progress=100; render(); markUnsaved(); }
function setGoalProgress(type,gid,eid,glid,val){ var arr=getGoalArr(type,gid,eid); var gl=arr.find(function(x){return x.id===glid;}); gl.progress=parseInt(val); gl.done=gl.progress>=100; render(); markUnsaved(); }

function openGroupModal(){ editingGroupId=null; document.getElementById('groupModalTitle').textContent='Новая группа'; document.getElementById('groupSaveBtn').textContent='Создать'; document.getElementById('groupName').value=''; document.getElementById('groupColor').value='#4f46e5'; document.getElementById('groupOverlay').classList.add('show'); }
function editGroup(id){ var g=data.groups.find(function(x){return x.id===id;}); editingGroupId=id; document.getElementById('groupModalTitle').textContent='Ред.группу'; document.getElementById('groupSaveBtn').textContent='Сохранить'; document.getElementById('groupName').value=g.name; document.getElementById('groupColor').value=g.color; document.getElementById('groupOverlay').classList.add('show'); }
function closeGroupModal(){ document.getElementById('groupOverlay').classList.remove('show'); }
function saveGroup(){ var n=document.getElementById('groupName').value.trim(); if(!n)return alert('Название?'); var c=document.getElementById('groupColor').value; if(editingGroupId){var g=data.groups.find(function(x){return x.id===editingGroupId;});g.name=n;g.color=c;}else{data.groups.push({id:'g'+Date.now(),name:n,color:c,goals:[],employees:[]});} closeGroupModal(); render(); markUnsaved(); }
function deleteGroup(id){ if(!confirm('Удалить?'))return; data.groups=data.groups.filter(function(g){return g.id!==id;}); render(); markUnsaved(); }

function exportData(){ var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='data-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); }
function triggerImport(){ document.getElementById('importInput').click(); }
function importData(ev){ var f=ev.target.files[0]; if(!f)return; var r=new FileReader(); r.onload=function(e){ try{ var p=JSON.parse(e.target.result); data=p; render(); markUnsaved(); alert('Данные загружены. Не забудьте нажать "Сохранить изменения"!'); }catch(err){alert('Ошибка');} }; r.readAsText(f); }

checkPassword();
</script>
</body>
</html>
