<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дашборд команды</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; color: #1a1a2e; padding: 20px; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 12px; }
  h1 { font-size: 22px; color: #2d3748; }
  .btn { background: #4f46e5; color: #fff; border: none; padding: 9px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: .2s; }
  .btn:hover { background: #4338ca; }
  .btn.secondary { background: #64748b; }
  .btn.secondary:hover { background: #475569; }
  .btn.green { background: #16a34a; }
  .btn.green:hover { background: #15803d; }
  .btn.small { padding: 4px 10px; font-size: 12px; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
  .boss-bar { background: linear-gradient(135deg,#1e293b,#334155); color:#fff; border-radius:14px; padding:16px 20px; margin-bottom:18px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 4px 14px rgba(0,0,0,.15); }
  .boss-info { display:flex; align-items:center; gap:14px; }
  .boss-avatar { width:52px; height:52px; border-radius:50%; background:#f59e0b; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
  .boss-name { font-size:18px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .boss-role { font-size:13px; opacity:.8; margin-top:2px; }
  .boss-empty { font-size:14px; opacity:.7; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 22px; }
  .stat-card { background: #fff; padding: 16px; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .stat-card .label { font-size: 13px; color: #718096; }
  .stat-card .value { font-size: 26px; font-weight: 700; margin-top: 4px; }
  .groups { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  @media (max-width: 1100px){ .groups { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 720px){ .groups { grid-template-columns: 1fr; } }
  .group { background: #fff; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.06); overflow: hidden; display: flex; flex-direction: column; }
  .group-head { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; color: #fff; }
  .group-head h2 { font-size: 17px; }
  .group-head .count { font-size: 12px; opacity: .85; }
  .group-head .actions { display:flex; gap:2px; }
  .group-body { padding: 12px; min-height: 60px; flex: 1; display:grid; grid-template-columns: 1fr; gap:10px; align-content:start; }
  .group-body.dragover { background: #eef2ff; }
  .team-goals { padding: 10px 12px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
  .team-goals .tg-title { font-size: 12px; font-weight:600; color:#475569; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }
  .team-goals-list { height:130px; overflow-y:auto; padding-right:4px; }
  .emp { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; cursor: grab; transition: .15s; border-left: 4px solid #94a3b8; display:flex; flex-direction:column; }
  .emp:hover { box-shadow: 0 3px 10px rgba(0,0,0,.1); }
  .emp.dragging { opacity: .4; }
  .emp.lead { border-left-color: #f59e0b; background: #fffbeb; }
  .emp-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .emp-name { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 6px; flex-wrap:wrap; }
  .emp-role { font-size: 12px; color: #64748b; margin-top: 2px; }
  .badge { font-size: 10px; background: #f59e0b; color: #fff; padding: 2px 6px; border-radius: 6px; }
  .badge.sub { background: #6366f1; }
  .emp-actions { display: flex; gap: 4px; }
  .icon-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px; opacity: .5; transition: .2s; }
  .icon-btn:hover { opacity: 1; }
  .schedule { font-size: 12px; color: #475569; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
  .duties-block { margin-top: 8px; }
  .duties-title { font-size:11px; font-weight:600; color:#475569; margin-bottom:4px; display:flex; justify-content:space-between; align-items:center; }
  .duties-list { list-style:none; display:flex; flex-direction:column; gap:3px; }
  .duty-item { display:flex; align-items:flex-start; gap:6px; font-size:12px; color:#334155; padding:3px 6px; border-radius:6px; transition:.15s; }
  .duty-item:hover { background:#eef2ff; }
  .duty-bullet { color:#6366f1; font-weight:700; line-height:1.4; flex-shrink:0; }
  .duty-text { flex:1; line-height:1.4; }
  .duty-del { opacity:0; cursor:pointer; color:#dc2626; font-weight:700; font-size:13px; flex-shrink:0; }
  .duty-item:hover .duty-del { opacity:.7; }
  .duty-del:hover { opacity:1; }
  .duties-empty { font-size:11px; color:#94a3b8; padding:2px 6px; }
  .goals-block { margin-top: 10px; }
  .goals-header { font-size:11px; font-weight:600; color:#475569; display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  .goals-list { max-height:180px; overflow-y:auto; padding-right:4px; }
  .goal { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 7px 9px; margin-bottom: 6px; }
  .goal.done { opacity:.7; background:#f0fdf4; border-color:#bbf7d0; }
  .goal-top { display:flex; justify-content:space-between; align-items:flex-start; gap:6px; }
  .goal-text { font-size:12px; font-weight:500; }
  .goal.done .goal-text { text-decoration: line-through; color:#64748b; }
  .goal-meta { font-size:10px; color:#94a3b8; margin-top:2px; display:flex; gap:8px; flex-wrap:wrap; }
  .goal-prio { font-size:9px; padding:1px 5px; border-radius:4px; color:#fff; }
  .prio-low { background:#94a3b8; } .prio-mid { background:#3b82f6; } .prio-high { background:#dc2626; }
  .goal-actions { display:flex; gap:2px; flex-shrink:0; }
  .goal-progress { height:5px; background:#e2e8f0; border-radius:3px; margin-top:5px; overflow:hidden; }
  .goal-progress-fill { height:100%; background:#4f46e5; border-radius:3px; transition:width .3s; }
  .goal.done .goal-progress-fill { background:#16a34a; }
  .goal-prog-controls { display:flex; align-items:center; gap:5px; margin-top:4px; }
  .goal-prog-controls input { flex:1; }
  .goals-empty { font-size:11px; color:#94a3b8; text-align:center; padding:8px; }
  .add-emp-btn { background: transparent; border: 2px dashed #cbd5e1; color: #64748b; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 13px; grid-column: 1 / -1; }
  .add-emp-btn:hover { border-color: #4f46e5; color: #4f46e5; }
  .team-goals-list::-webkit-scrollbar, .goals-list::-webkit-scrollbar { width:5px; }
  .team-goals-list::-webkit-scrollbar-thumb, .goals-list::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 24px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; margin-bottom: 5px; color: #475569; font-weight: 500; }
  .field input, .field select, .field textarea { width: 100%; padding: 9px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; font-family: inherit; }
  .field textarea { resize: vertical; min-height: 80px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
  .hint { font-size: 11px; color: #94a3b8; margin-top: 4px; }
  .empty { color: #94a3b8; font-size: 13px; text-align: center; padding: 10px; grid-column:1/-1; }
</style>
</head>
<body>

<header>
  <h1>👥 Дашборд команды (Онлайн)</h1>
  <div class="toolbar">
    <button class="btn" onclick="openGroupModal()">➕ Группа</button>
    <button class="btn secondary" onclick="exportHTML()">📄 Скачать HTML</button>
    <button class="btn secondary" onclick="exportData()">💾 Экспорт JSON</button>
    <button class="btn secondary" onclick="triggerImport()">📂 Импорт JSON</button>
    <input type="file" id="importInput" accept="application/json,.json" style="display:none" onchange="importData(event)">
  </div>
</header>

<div class="boss-bar" id="bossBar">
  <div class="boss-info">
    <div class="boss-avatar">👑</div>
    <div>
      <div class="boss-name">Загрузка...</div>
      <div class="boss-role">...</div>
    </div>
  </div>
  <button class="btn secondary small" onclick="openBossModal()">✏️</button>
</div>

<div class="stats" id="stats">
    <div class="stat-card"><div class="label">Всего сотрудников</div><div class="value">0</div></div>
    <div class="stat-card"><div class="label">Цели (выполнено)</div><div class="value" style="color:#16a34a">0/0</div></div>
</div>

<div class="groups" id="groups">
  <div class="empty">Загрузка данных из базы...</div>
</div>

<!-- Модалки -->
<div class="overlay" id="bossOverlay"><div class="modal"><h3>Руководитель</h3><div class="field"><label>Имя</label><input id="bossName"></div><div class="field"><label>Должность</label><input id="bossRole"></div><div class="modal-actions"><button class="btn secondary" onclick="closeBossModal()">Отмена</button><button class="btn" onclick="saveBoss()">Сохранить</button></div></div></div>
<div class="overlay" id="empOverlay"><div class="modal"><h3 id="empModalTitle">Сотрудник</h3><div class="field"><label>Имя</label><input id="empName"></div><div class="field"><label>Должность</label><input id="empRole"></div><div class="field"><label>График</label><input id="empSchedule"></div><div class="field"><label>Статус</label><select id="empStatus"><option value="member">Участник</option><option value="lead">Руководитель</option><option value="sublead">Зам</option></select></div><div class="field"><label>Обязанности (каждая с новой строки)</label><textarea id="empDuties"></textarea></div><div class="modal-actions"><button class="btn secondary" onclick="closeEmpModal()">Отмена</button><button class="btn" onclick="saveEmp()">Сохранить</button></div></div></div>
<div class="overlay" id="dutyOverlay"><div class="modal"><h3>Обязанность</h3><div class="field"><label>Текст</label><input id="dutyText"></div><div class="modal-actions"><button class="btn secondary" onclick="closeDutyModal()">Отмена</button><button class="btn" onclick="saveDuty()">Добавить</button></div></div></div>
<div class="overlay" id="groupOverlay"><div class="modal"><h3 id="groupModalTitle">Группа</h3><div class="field"><label>Название</label><input id="groupName"></div><div class="field"><label>Цвет</label><input id="groupColor" type="color" value="#4f46e5"></div><div class="modal-actions"><button class="btn secondary" onclick="closeGroupModal()">Отмена</button><button class="btn" id="groupSaveBtn" onclick="saveGroup()">Создать</button></div></div></div>
<div class="overlay" id="goalOverlay"><div class="modal"><h3 id="goalModalTitle">Цель</h3><div class="field"><label>Описание</label><input id="goalText"></div><div class="field"><label>Приоритет</label><select id="goalPrio"><option value="low">Низкий</option><option value="mid" selected>Средний</option><option value="high">Высокий</option></select></div><div class="field"><label>Дедлайн</label><input id="goalDeadline" type="date"></div><div class="field"><label>Прогресс (%)</label><input id="goalProgress" type="number" min="0" max="100" value="0"></div><div class="modal-actions"><button class="btn secondary" onclick="closeGoalModal()">Отмена</button><button class="btn green" onclick="saveGoal()">Сохранить</button></div></div></div>

<!-- СКРИПТ С БАЗОЙ ДАННЫХ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ---------- НАСТРОЙКИ БАЗЫ ДАННЫХ (ЕДИНСТВЕННОЕ МЕСТО ОБЪЯВЛЕНИЯ) ---------- */
const SUPABASE_URL = 'https://emsndpczwqeqhwozlsxb.supabase.co'; 
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtc25kcGN6d3FlcWh3b3psc3hiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNDA4NTMsImV4cCI6MjA5OTYxNjg1M30.bWbUHFXjGqZfJ5Zp5Zmyr1iAhci08ndF_jUNxSR22EU'; 

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let data = { "boss": { "name": "Загрузка...", "role": "" }, "groups": [] };
let editing = { groupId: null, empId: null };
let goalTarget = { type:null, groupId:null, empId:null, goalId:null };
let dutyTarget = { groupId:null, empId:null };
let editingGroupId = null;
let isSaving = false;

async function loadData() {
  const { data: rows, error } = await supabase.from('dashboard_data').select('data').order('updated_at', { ascending: false }).limit(1);
  if (error) { console.error(error); alert('Ошибка загрузки данных. Проверьте консоль.'); return; }
  if (rows && rows.length > 0) {
    data = rows[0].data;
    if(!data.groups) data.groups = [];
    render();
  } else {
    render(); 
  }
}

async function saveDataToDB() {
  if (isSaving) return;
  isSaving = true;
  const { error } = await supabase.from('dashboard_data').upsert({ id: 1, data: data }, { onConflict: 'id' });
  if (error) console.error('Ошибка сохранения:', error);
  isSaving = false;
}

/* --- Helpers --- */
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function prioClass(p){ return p==='high'?'prio-high':p==='low'?'prio-low':'prio-mid'; }
function prioLabel(p){ return p==='high'?'Высокий':p==='low'?'Низкий':'Средний'; }
function fmtDate(d){ if(!d) return ''; const dt=new Date(d); return dt.toLocaleDateString('ru-RU',{day:'2-digit',month:'short'}); }
function isOverdue(g){ return g.deadline && !g.done && new Date(g.deadline) < new Date().setHours(0,0,0,0); }

/* --- Render --- */
function render() {
  renderBoss();
  renderStats();
  const cont = document.getElementById('groups');
  cont.innerHTML = '';
  if(data.groups.length === 0) {
    cont.innerHTML = '<div class="empty">Нет групп. Нажмите "➕ Группа" чтобы создать первую.</div>';
    return;
  }
  data.groups.forEach(g => {
    const groupEl = document.createElement('div');
    groupEl.className = 'group';
    groupEl.innerHTML = `
      <div class="group-head" style="background:${g.color}">
        <div><h2>${escapeHtml(g.name)}</h2><div class="count">${g.employees.length} сотр. · целей ${g.goals.length}</div></div>
        <div class="actions">
          <button class="icon-btn" style="color:#fff" onclick="openGoalModal('team','${g.id}')">🎯</button>
          <button class="icon-btn" style="color:#fff" onclick="editGroup('${g.id}')">✏️</button>
          <button class="icon-btn" style="color:#fff" onclick="deleteGroup('${g.id}')">🗑</button>
        </div>
      </div>
      <div class="team-goals">
        <div class="tg-title">🎯 Цели команды <button class="btn green small" onclick="openGoalModal('team','${g.id}')">＋</button></div>
        <div class="team-goals-list">${g.goals.length ? g.goals.map(gl=>goalCard(gl,'team',g.id,null)).join('') : '<div class="goals-empty">Нет целей</div>'}</div>
      </div>
      <div class="group-body" data-group="${g.id}" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${g.id}')">
        ${g.employees.map(e => empCard(g.id, e)).join('') || '<div class="empty">Пусто</div>'}
        <button class="add-emp-btn" onclick="openEmpModal('${g.id}')">＋ Сотрудник</button>
      </div>`;
    cont.appendChild(groupEl);
  });
  attachDrag();
}

function renderBoss(){
  const b = data.boss;
  const bar = document.getElementById('bossBar');
  if(b && b.name){
    bar.innerHTML = `<div class="boss-info"><div class="boss-avatar">👑</div><div><div class="boss-name">${escapeHtml(b.name)}</div><div class="boss-role">${escapeHtml(b.role||'')}</div></div></div><button class="btn secondary small" onclick="openBossModal()">✏️</button>`;
  } else {
    bar.innerHTML = `<div class="boss-empty">👑 Руководитель не назначен</div><button class="btn small" onclick="openBossModal()">➕ Назначить</button>`;
  }
}

function empCard(groupId, e) {
  const badge = e.status === 'lead' ? '<span class="badge">👑</span>' : e.status === 'sublead' ? '<span class="badge sub">⭐</span>' : '';
  return `<div class="emp ${e.status !== 'member' ? 'lead' : ''}" draggable="true" data-emp="${e.id}" data-group="${groupId}">
    <div class="emp-top"><div><div class="emp-name">${escapeHtml(e.name)} ${badge}</div><div class="emp-role">${escapeHtml(e.role||'')}</div></div>
    <div class="emp-actions"><button class="icon-btn" onclick="openGoalModal('emp','${groupId}','${e.id}')">🎯</button><button class="icon-btn" onclick="editEmp('${groupId}','${e.id}')">✏️</button><button class="icon-btn" onclick="deleteEmp('${groupId}','${e.id}')">🗑</button></div></div>
    <div class="schedule">🕐 ${escapeHtml(e.schedule||'')}</div>
    <div class="duties-block"><div class="duties-title">📋 Обязанности <button class="btn small" onclick="openDutyModal('${groupId}','${e.id}')">＋</button></div>
    <ul class="duties-list">${e.duties.length ? e.duties.map((d,i)=>`<li class="duty-item"><span class="duty-bullet">•</span><span class="duty-text">${escapeHtml(d)}</span><span class="duty-del" onclick="removeDuty('${groupId}','${e.id}',${i})">×</span></li>`).join('') : '<li class="duties-empty">Нет</li>'}</ul></div>
    <div class="goals-block"><div class="goals-header">🎯 Цели (${e.goals.length}) <button class="btn green small" onclick="openGoalModal('emp','${groupId}','${e.id}')">＋</button></div>
    <div class="goals-list">${e.goals.length ? e.goals.map(gl=>goalCard(gl,'emp',groupId,e.id)).join('') : '<div class="goals-empty">Нет</div>'}</div></div></div>`;
}

function goalCard(gl, type, groupId, empId){
  const eid = empId ? `'${empId}'` : 'null';
  const overdue = isOverdue(gl);
  return `<div class="goal ${gl.done?'done':''}"><div class="goal-top"><div>
    <div class="goal-text">${escapeHtml(gl.text)}</div>
    <div class="goal-meta"><span class="goal-prio ${prioClass(gl.prio)}">${prioLabel(gl.prio)}</span>${gl.deadline?`<span style="${overdue?'color:red;font-weight:bold':''}">📅 ${fmtDate(gl.deadline)}</span>`:''}</div>
    </div><div class="goal-actions">
    <button class="icon-btn" onclick="toggleGoal('${type}','${groupId}',${eid},'${gl.id}')">${gl.done?'↩️':'✅'}</button>
    <button class="icon-btn" onclick="editGoal('${type}','${groupId}',${eid},'${gl.id}')">✏️</button>
    <button class="icon-btn" onclick="deleteGoal('${type}','${groupId}',${eid},'${gl.id}')">🗑</button>
    </div></div><div class="goal-progress"><div class="goal-progress-fill" style="width:${gl.progress}%"></div></div>
    <div class="goal-prog-controls"><input type="range" min="0" max="100" value="${gl.progress}" oninput="setGoalProgress('${type}','${groupId}',${eid},'${gl.id}',this.value)"><span style="font-size:10px">${gl.progress}%</span></div></div>`;
}

function renderStats() {
  const all = data.groups.flatMap(g => g.employees);
  const allGoals = [...data.groups.flatMap(g=>g.goals), ...all.flatMap(e=>e.goals)];
  const doneGoals = allGoals.filter(g=>g.done).length;
  document.getElementById('stats').innerHTML = `<div class="stat-card"><div class="label">Сотрудников</div><div class="value">${all.length}</div></div><div class="stat-card"><div class="label">Цели</div><div class="value" style="color:#16a34a">${doneGoals}/${allGoals.length}</div></div>`;
}

/* --- Drag & Drop --- */
let dragged = null;
function attachDrag() {
  document.querySelectorAll('.emp').forEach(el => {
    el.addEventListener('dragstart', () => { dragged = { emp: el.dataset.emp, group: el.dataset.group }; el.classList.add('dragging'); });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
  });
}
function onDragOver(e){ e.preventDefault(); e.currentTarget.classList.add('dragover'); }
function onDragLeave(e){ e.currentTarget.classList.remove('dragover'); }
function onDrop(e, targetGroup){
  e.preventDefault(); e.currentTarget.classList.remove('dragover');
  if(!dragged || dragged.group === targetGroup) return;
  const fromG = data.groups.find(g=>g.id===dragged.group);
  const toG = data.groups.find(g=>g.id===targetGroup);
  const idx = fromG.employees.findIndex(x=>x.id===dragged.emp);
  const [emp] = fromG.employees.splice(idx,1);
  toG.employees.push(emp);
  dragged = null;
  render();
  saveDataToDB();
}

/* --- CRUD Functions --- */
function openBossModal(){ document.getElementById('bossName').value = data.boss?.name||''; document.getElementById('bossRole').value = data.boss?.role||''; document.getElementById('bossOverlay').classList.add('show'); }
function closeBossModal(){ document.getElementById('bossOverlay').classList.remove('show'); }
function saveBoss(){ const name = document.getElementById('bossName').value.trim(); if(!name) return alert('Имя обязательно'); data.boss = { name, role: document.getElementById('bossRole').value.trim() }; closeBossModal(); render(); saveDataToDB(); }

function openEmpModal(groupId){ editing = { groupId, empId:null }; document.getElementById('empModalTitle').textContent = 'Новый'; ['empName','empRole','empSchedule','empDuties'].forEach(id=>document.getElementById(id).value=''); document.getElementById('empStatus').value='member'; document.getElementById('empOverlay').classList.add('show'); }
function editEmp(groupId, empId){ editing = { groupId, empId }; const e = data.groups.find(g=>g.id===groupId).employees.find(x=>x.id===empId); document.getElementById('empModalTitle').textContent = 'Ред.'; document.getElementById('empName').value=e.name; document.getElementById('empRole').value=e.role; document.getElementById('empSchedule').value=e.schedule; document.getElementById('empStatus').value=e.status; document.getElementById('empDuties').value=e.duties.join('\n'); document.getElementById('empOverlay').classList.add('show'); }
function saveEmp(){ const name = document.getElementById('empName').value.trim(); if(!name) return alert('Имя обязательно'); const g = data.groups.find(g=>g.id===editing.groupId); const obj = { name, role: document.getElementById('empRole').value.trim(), schedule: document.getElementById('empSchedule').value.trim(), status: document.getElementById('empStatus').value, duties: document.getElementById('empDuties').value.split('\n').map(s=>s.trim()).filter(Boolean) }; if(editing.empId){ Object.assign(g.employees.find(x=>x.id===editing.empId), obj); } else { obj.id='e'+Date.now(); obj.goals=[]; g.employees.push(obj); } closeEmpModal(); render(); saveDataToDB(); }
function closeEmpModal(){ document.getElementById('empOverlay').classList.remove('show'); }
function deleteEmp(groupId, empId){ if(!confirm('Удалить?')) return; const g = data.groups.find(g=>g.id===groupId); g.employees = g.employees.filter(x=>x.id!==empId); render(); saveDataToDB(); }

function openDutyModal(groupId, empId){ dutyTarget = { groupId, empId }; document.getElementById('dutyText').value=''; document.getElementById('dutyOverlay').classList.add('show'); }
function closeDutyModal(){ document.getElementById('dutyOverlay').classList.remove('show'); }
function saveDuty(){ const text = document.getElementById('dutyText').value.trim(); if(!text) return; data.groups.find(g=>g.id===dutyTarget.groupId).employees.find(x=>x.id===dutyTarget.empId).duties.push(text); closeDutyModal(); render(); saveDataToDB(); }
function removeDuty(groupId, empId, i){ data.groups.find(g=>g.id===groupId).employees.find(x=>x.id===empId).duties.splice(i,1); render(); saveDataToDB(); }

function getGoalArray(type, groupId, empId){ const g = data.groups.find(g=>g.id===groupId); return type==='team' ? g.goals : g.employees.find(x=>x.id===empId).goals; }
function openGoalModal(type, groupId, empId=null){ goalTarget = { type, groupId, empId, goalId:null }; const g = data.groups.find(g=>g.id===groupId); const who = type==='team' ? g.name : (g.employees.find(x=>x.id===empId) ? g.employees.find(x=>x.id===empId).name : 'Сотрудник'); document.getElementById('goalModalTitle').textContent = 'Цель: ' + who; document.getElementById('goalText').value=''; document.getElementById('goalPrio').value='mid'; document.getElementById('goalDeadline').value=''; document.getElementById('goalProgress').value=0; document.getElementById('goalOverlay').classList.add('show'); }
function editGoal(type, groupId, empId, goalId){ goalTarget = { type, groupId, empId, goalId }; const gl = getGoalArray(type, groupId, empId).find(x=>x.id===goalId); document.getElementById('goalModalTitle').textContent = 'Ред. цель'; document.getElementById('goalText').value=gl.text; document.getElementById('goalPrio').value=gl.prio; document.getElementById('goalDeadline').value=gl.deadline||''; document.getElementById('goalProgress').value=gl.progress; document.getElementById('goalOverlay').classList.add('show'); }
function saveGoal(){ const text = document.getElementById('goalText').value.trim(); if(!text) return alert('Текст цели'); const arr = getGoalArray(goalTarget.type, goalTarget.groupId, goalTarget.empId); const progress = parseInt(document.getElementById('goalProgress').value)||0; const obj = { text, prio: document.getElementById('goalPrio').value, deadline: document.getElementById('goalDeadline').value, progress, done: progress>=100 }; if(goalTarget.goalId){ Object.assign(arr.find(x=>x.id===goalTarget.goalId), obj); } else { obj.id='gl'+Date.now(); arr.push(obj); } closeGoalModal(); render(); saveDataToDB(); }
function closeGoalModal(){ document.getElementById('goalOverlay').classList.remove('show'); }
function deleteGoal(type, groupId, empId, goalId){ if(!confirm('Удалить?')) return; const arr = getGoalArray(type, groupId, empId); const i = arr.findIndex(x=>x.id===goalId); arr.splice(i,1); render(); saveDataToDB(); }
function toggleGoal(type, groupId, empId, goalId){ const gl = getGoalArray(type, groupId, empId).find(x=>x.id===goalId); gl.done = !gl.done; if(gl.done) gl.progress = 100; render(); saveDataToDB(); }
function setGoalProgress(type, groupId, empId, goalId, val){ const gl = getGoalArray(type, groupId, empId).find(x=>x.id===goalId); gl.progress = parseInt(val); gl.done = gl.progress>=100; render(); }

function openGroupModal(){ editingGroupId = null; document.getElementById('groupModalTitle').textContent = 'Новая группа'; document.getElementById('groupSaveBtn').textContent = 'Создать'; document.getElementById('groupName').value=''; document.getElementById('groupColor').value='#4f46e5'; document.getElementById('groupOverlay').classList.add('show'); }
function editGroup(id){ const g = data.groups.find(x=>x.id===id); if(!g) return; editingGroupId = id; document.getElementById('groupModalTitle').textContent = 'Ред. группу'; document.getElementById('groupSaveBtn').textContent = 'Сохранить'; document.getElementById('groupName').value = g.name; document.getElementById('groupColor').value = g.color; document.getElementById('groupOverlay').classList.add('show'); }
function closeGroupModal(){ document.getElementById('groupOverlay').classList.remove('show'); }
function saveGroup(){ const name = document.getElementById('groupName').value.trim(); if(!name) return alert('Название'); const color = document.getElementById('groupColor').value; if(editingGroupId){ const g = data.groups.find(x=>x.id===editingGroupId); g.name = name; g.color = color; } else { data.groups.push({ id:'g'+Date.now(), name, color, goals:[], employees:[] }); } closeGroupModal(); render(); saveDataToDB(); }
function deleteGroup(id){ if(!confirm('Удалить группу?')) return; data.groups = data.groups.filter(g=>g.id!==id); render(); saveDataToDB(); }

function exportData(){ const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'data.json'; a.click(); }
function triggerImport(){ document.getElementById('importInput').click(); }
function importData(event){ const file = event.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = (e) => { try { const parsed = JSON.parse(e.target.result); if(!parsed.groups) return alert('Ошибка формата'); data = parsed; render(); saveDataToDB(); alert('Загружено!'); } catch(err){ alert('Ошибка'); } }; reader.readAsText(file); event.target.value = ''; }
function exportHTML(){ const doc = document.documentElement.cloneNode(true); doc.querySelectorAll('.overlay.show').forEach(o => o.classList.remove('show')); const html = '<!DOCTYPE html>\n' + doc.outerHTML; const blob = new Blob([html], { type:'text/html' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `dashboard-${new Date().toISOString().slice(0,10)}.html`; a.click(); }

loadData();
</script>
</body>
